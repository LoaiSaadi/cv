about_content: |
  Hi, my name is Loai Saadi. I have a BSc in Computer Science and currently work as a NOC Engineer. Alongside my main role, I have worked on automation, monitoring, DevOps, and cloud-related projects in real environments.

  My recent work includes Python automation, monitoring systems, cloud infrastructure, CI/CD, and computer vision projects. I am currently focused on growing toward DevOps, Cloud, and Software Engineering roles, and I am currently learning AWS courses to strengthen my cloud knowledge.

  I am most skilled in: <mark>Python</mark>, <mark>AWS</mark>, <mark>Docker</mark>, <mark>Kubernetes</mark>, <mark>Terraform</mark>, and <mark>Selenium</mark>.

